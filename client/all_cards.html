  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f1ea;
      color: #1f2328;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px 18px;
      background: #ffffff;
      border-bottom: 1px solid #d8d2c6;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
    }

    main {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
      padding: 18px;
    }

    figure {
      margin: 0;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
      box-shadow: 0 2px 10px rgb(0 0 0 / 18%);
      background: #111;
    }

    figcaption {
      padding-top: 6px;
      font-size: 13px;
      line-height: 1.25;
    }

    .meta {
      color: #656d76;
    }
  </style>
</head>
