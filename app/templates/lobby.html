{% extends "base.html" %}

{% block content %}
  <div>
    <label for="display-name">Name:</label>
    <input id="display-name" value="{{ display_name }}" maxlength="32">
    <button onclick="save_name();">Save</button>
    <button onclick="create_invite();">Create invite link</button>
  </div>
  <div id="grid-lobby">
    <div id="cell-users">
    <h2>Users</h2>
    <ul id="users" class="scroll-list">
      <li class="robot_user">__ai__random__ <button onclick="duel('__ai__random__')">Duel</button></li>
    </ul>
    </div>
    <div id="cell-games">
    <h2>My Games</h2>
    <ul id="games" class="scroll-list"></ul>
  </div>
  <div id="cell-chat">
    <h2>Chat</h2>
    <ul id="chat" class="scroll-list"></ul>
    <label for="chat_msg">Chat:</label>
    <input type='text' id="chat_msg" onkeyup="if (event.keyCode === 13) {send_msg();}"></input>
    <button onclick="send_msg();">Send</button>
    </div>
  </div>
  {% if savegames %}
  <ul>
    {% for game in savegames %}
    <li><button onclick="loadsaved('{{ game }}')">{{ game }}</button></li>
    {% endfor %}
  </ul>
  {% endif %}
  <script>
    window.PLAYER_ID = "{{ player_id }}";
  </script>

{% endblock %}

{% block afterbody %}
    <script src="{{ url_for('static', filename='lobby.js') }}"></script>
{% endblock %}
